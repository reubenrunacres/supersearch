<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperSearch - Superconductor Composition Explorer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0e1a;
            color: #e8e8e8;
            overflow: hidden;
        }
        
        #header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 30px;
            background: linear-gradient(180deg, #0a0e1a 0%, transparent 100%);
            z-index: 100;
        }
        
        #title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 5px;
        }
        
        #subtitle {
            font-size: 13px;
            color: #888;
            letter-spacing: 0.3px;
        }
        
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(20, 25, 35, 0.9);
            border: 1px solid rgba(100, 150, 200, 0.3);
            border-radius: 8px;
            padding: 15px 20px;
            font-size: 13px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        #stats {
            margin-top: 8px;
            color: #aaa;
            font-size: 12px;
        }
        
        #canvas {
            width: 100vw;
            height: 100vh;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            color: #3b82f6;
        }
    </style>
</head>
<body>
    <div id="header">
        <div id="title">SuperSearch</div>
        <div id="subtitle">Superconductor Composition Explorer</div>
    </div>
    
    <div id="info">
        <div class="loading">Loading materials...</div>
        <div id="stats"></div>
    </div>
    
    <div id="canvas"></div>
    
    <script>
        const infoDiv = document.querySelector('#info .loading');
        const statsDiv = document.getElementById('stats');
        const container = document.getElementById('canvas');
        
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0e1a);
        scene.fog = new THREE.Fog(0x0a0e1a, 50, 200);
        
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(80, 60, 80);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);
        
        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.3;
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const pointLight1 = new THREE.PointLight(0x3b82f6, 2, 300);
        pointLight1.position.set(60, 60, 60);
        scene.add(pointLight1);
        
        const pointLight2 = new THREE.PointLight(0x8b5cf6, 1.5, 300);
        pointLight2.position.set(-60, -30, -60);
        scene.add(pointLight2);
        
        // Load and render materials
        fetch('data/analysis_results_fast.json')
            .then(r => {
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return r.json();
            })
            .then(data => {
                const materials = data.materials;
                infoDiv.textContent = `${materials.length.toLocaleString()} superconductor materials`;
                
                // Show stats
                const clusters = new Set(materials.map(m => m.cluster)).size;
                const avgTc = (materials.reduce((sum, m) => sum + m.tc, 0) / materials.length).toFixed(1);
                statsDiv.innerHTML = `${clusters} clusters • Avg Tc: ${avgTc}K`;
                
                // Create geometry
                const geometry = new THREE.BufferGeometry();
                const positions = [];
                const colors = [];
                
                // Calculate ranges
                const xVals = materials.map(m => m.x);
                const yVals = materials.map(m => m.y);
                const tcVals = materials.map(m => m.tc);
                
                const xMin = Math.min(...xVals), xMax = Math.max(...xVals);
                const yMin = Math.min(...yVals), yMax = Math.max(...yVals);
                const tcMin = Math.min(...tcVals), tcMax = Math.max(...tcVals);
                
                materials.forEach(m => {
                    // Scale to 3D space
                    const x = ((m.x - xMin) / (xMax - xMin) - 0.5) * 60;
                    const y = ((m.tc - tcMin) / (tcMax - tcMin) - 0.5) * 60;
                    const z = ((m.y - yMin) / (yMax - yMin) - 0.5) * 60;
                    
                    positions.push(x, y, z);
                    
                    // Color by Tc (blue to pink gradient)
                    const t = (m.tc - tcMin) / (tcMax - tcMin);
                    const r = 0.2 + t * 0.8;
                    const g = 0.3;
                    const b = 0.9 - t * 0.5;
                    colors.push(r, g, b);
                });
                
                geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
                
                const material = new THREE.PointsMaterial({
                    size: 0.8,
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.8,
                    sizeAttenuation: true
                });
                
                const points = new THREE.Points(geometry, material);
                scene.add(points);
                
                console.log('✓ Rendered', materials.length, 'materials');
            })
            .catch(e => {
                infoDiv.textContent = 'Error: ' + e.message;
                infoDiv.style.color = '#ef4444';
                console.error('Load error:', e);
            });
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
