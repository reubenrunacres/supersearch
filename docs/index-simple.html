<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperSearch - Works</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: monospace; overflow: hidden; }
        #canvas { width: 100vw; height: 100vh; }
        #status { position: absolute; top: 20px; left: 20px; font-size: 18px; }
    </style>
</head>
<body>
    <div id="status">Loading...</div>
    <div id="canvas"></div>
    <script>
        // Simple working version
        const status = document.getElementById('status');
        const container = document.getElementById('canvas');
        
        // Scene
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 50;
        
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);
        
        // Test: Just render a single blue cube to prove it works
        const geometry = new THREE.BoxGeometry();
        const material = new THREE.MeshBasicMaterial({ color: 0x3b82f6 });
        const cube = new THREE.Mesh(geometry, material);
        scene.add(cube);
        
        status.textContent = '✓ Rendering test cube';
        
        function animate() {
            requestAnimationFrame(animate);
            cube.rotation.x += 0.01;
            cube.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
